<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#c5a059;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ecd6aa;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c5a059;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Diamond shape -->
  <polygon points="16,4 24,12 16,28 8,12" fill="url(#goldGradient)" stroke="#8B4513" stroke-width="1"/>
  <!-- Crown highlight -->
  <polygon points="16,6 22,12 16,24 10,12" fill="url(#goldGradient)" opacity="0.8"/>
  <!-- Shine effect -->
  <circle cx="13" cy="10" r="1.5" fill="white" opacity="0.9"/>
</svg>
